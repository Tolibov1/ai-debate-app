<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Debate Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="logo">AI Debate Coach</h1>
    </header>

    <!-- SETUP -->
    <section id="setup-screen" class="screen" aria-labelledby="setup-heading">
      <h2 id="setup-heading" class="sr-only">Debate setup</h2>
      <div class="card setup-card">
        <div class="trending-block" aria-label="Trending topics">
          <p class="trending-title">🔥 Trending in 24h</p>
          <div class="trending-row">
            <span class="trending-pill">AI regulation <span class="fire-badge" aria-hidden="true">🔥</span></span>
            <span class="trending-pill">Climate policy <span class="fire-badge" aria-hidden="true">🔥</span></span>
            <span class="trending-pill">Universal basic income <span class="fire-badge" aria-hidden="true">🔥</span></span>
          </div>
        </div>

        <p class="field-label">Pick a topic</p>
        <div class="topic-grid topic-grid--scattered" role="group" aria-label="Preset topics">
          <button type="button" class="topic-card" data-topic="Social Media">Social Media</button>
          <button type="button" class="topic-card" data-topic="AI &amp; Jobs">AI &amp; Jobs</button>
          <button type="button" class="topic-card" data-topic="Education">Education</button>
          <button type="button" class="topic-card" data-topic="Remote Work">Remote Work</button>
          <button type="button" class="topic-card" data-topic="Space Exploration">Space Exploration</button>
        </div>

        <label for="custom-topic" class="field-label">Or type your own topic</label>
        <input type="text" id="custom-topic" class="custom-topic-input" placeholder="e.g. Should voting be mandatory?" autocomplete="off" maxlength="200" />

        <fieldset class="difficulty-fieldset">
          <legend class="field-label">Difficulty</legend>
          <p id="difficulty-label" class="difficulty-label" aria-live="polite">Competitive</p>
          <div class="difficulty-buttons" role="group" aria-label="Difficulty level 1 to 7">
            <button type="button" class="difficulty-btn" data-level="1" aria-pressed="false">1</button>
            <button type="button" class="difficulty-btn" data-level="2" aria-pressed="false">2</button>
            <button type="button" class="difficulty-btn difficulty-btn--selected" data-level="3" aria-pressed="true">3</button>
            <button type="button" class="difficulty-btn" data-level="4" aria-pressed="false">4</button>
            <button type="button" class="difficulty-btn" data-level="5" aria-pressed="false">5</button>
            <button type="button" class="difficulty-btn" data-level="6" aria-pressed="false">6</button>
            <button type="button" class="difficulty-btn" data-level="7" aria-pressed="false">7</button>
          </div>
        </fieldset>

        <fieldset class="time-fieldset">
          <legend class="field-label">Time limit</legend>
          <div class="time-buttons" role="group" aria-label="Debate time limit">
            <button type="button" class="time-btn" data-minutes="1" aria-pressed="false">1 min</button>
            <button type="button" class="time-btn" data-minutes="5" aria-pressed="false">5 min</button>
            <button type="button" class="time-btn time-btn--selected" data-minutes="10" aria-pressed="true">10 min</button>
            <button type="button" class="time-btn" data-minutes="15" aria-pressed="false">15 min</button>
          </div>
        </fieldset>

        <button type="button" id="start-debate-btn" class="btn btn-primary">START DEBATE</button>
      </div>
    </section>

    <!-- DEBATE -->
    <section id="debate-screen" class="screen" hidden aria-labelledby="debate-heading">
      <h2 id="debate-heading" class="sr-only">Live debate</h2>
      <div class="debate-toolbar">
        <p class="debate-topic" id="debate-topic-label" aria-live="polite"></p>
        <div id="timer" class="timer" role="timer" aria-live="polite" aria-atomic="true">00:00</div>
      </div>
      <div id="chat-window" class="chat-window" role="log" aria-relevant="additions" aria-label="Debate messages"></div>
      <div class="debate-input-row">
        <label for="argument-input" class="sr-only">Your argument</label>
        <textarea id="argument-input" class="argument-input" rows="2" placeholder="Type your argument…" autocomplete="off"></textarea>
        <button type="button" id="send-btn" class="btn btn-send">SEND</button>
      </div>
      <button type="button" id="finish-btn" class="btn btn-secondary">Finish &amp; Review</button>
    </section>

    <!-- REVIEW -->
    <section id="review-screen" class="screen" hidden aria-labelledby="review-heading">
      <h2 id="review-heading" class="sr-only">Debate review</h2>
      <div id="review-inner" class="review-inner">
        <div class="review-reveal verdict-wrap">
          <div id="verdict-block" class="verdict-winner verdict-winner--user">
            <span id="verdict-winner-line" class="verdict-winner-line">🏆 YOU WIN</span>
            <p id="verdict-why" class="verdict-why" aria-live="polite"></p>
          </div>
        </div>

        <div class="card score-card review-reveal">
          <p class="score-label">Your score</p>
          <p class="score-number" id="score-number"><span id="score-value">—</span><span class="score-max">/10</span></p>
          <div class="score-bar-wrap" aria-hidden="true">
            <div id="score-bar" class="score-bar score-bar--animated" style="width: 0%"></div>
          </div>
        </div>

        <div class="card review-card review-card--strong review-reveal">
          <h3 class="review-card-title">Strongest point</h3>
          <p id="strongest-point" class="review-card-body">—</p>
        </div>
        <div class="card review-card review-card--weak review-reveal">
          <h3 class="review-card-title">Weakest point</h3>
          <p id="weakest-point" class="review-card-body">—</p>
        </div>
        <div class="card review-card review-card--feedback review-reveal">
          <h3 class="review-card-title">Feedback</h3>
          <p id="feedback-text" class="review-card-body">—</p>
        </div>

        <div class="card argument-breakdown-card review-reveal">
          <h3 class="review-card-title">Argument breakdown</h3>
          <div id="argument-breakdown-list" class="argument-breakdown-list"></div>
        </div>

        <button type="button" id="try-again-btn" class="btn btn-primary review-reveal">DEBATE AGAIN</button>
      </div>
    </section>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
